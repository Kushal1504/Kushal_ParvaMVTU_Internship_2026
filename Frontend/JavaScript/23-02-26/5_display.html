<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Display in JavaScript</h1>
    <p>1. console.log() --> it is used to print output in the console</p>
    <p>2. window.alert() --> it is used to display the output in alert box</p>
    <p>3. document.write() --> it is used to write output in the document</p>

    <button onclick="alterWindow()">window alert</button>
    <button onclick="documentwrite()">Document write</button>

    <script>
        function alterWindow() {
            window.alert("User clicked the button");
        }

        function documentwrite() {
            document.write("User clicked the button");
        }
    </script>
</body>
</html>
