<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .outer-box{
            border: 5px solid black;
            display: grid;
            height: 1000px;
            /* grid-template-columns: no of columns with size */
            /* grid-template-row: no of columns with size */
            /* fr - fraction (strech size to available width) */
            /* grid-template-columns: 200px 200px 200px 200px 200px ; */
            grid-template-columns: 1fr 2fr 1fr;
            /* grid-template-rows: 200px 200px 200px 200px 200px ; */
            grid-template-rows: 1fr 1fr 1fr 1fr;
        }

        .box{
            background-color: brown;
            border: 1px solid white;
            color: white;
            font-size: 30px;
        }
    </style>
</head>
<body>
    <div class="outer-box">
        <!-- div.box.box-${box $}*10 -->
        <div class="box box-1">box 1</div>
        <div class="box box-2">box 2</div>
        <div class="box box-3">box 3</div>
        <div class="box box-4">box 4</div>
        <div class="box box-5">box 5</div>
        <div class="box box-6">box 6</div>
        <div class="box box-7">box 7</div>
        <div class="box box-8">box 8</div>
        <div class="box box-9">box 9</div>
        <div class="box box-10">box 10</div>
        <div class="box box-11">box 11</div>
        <div class="box box-12">box 12</div>
        <div class="box box-13">box 13</div>
        <div class="box box-14">box 14</div>
        <div class="box box-15">box 15</div>
    </div>
</body>
</html>
