<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            width: 200px;
            height: 200px;
            background-color: brown;
            /* change the position in x axis */
            transform: translateX(100px);
            /* change the position in y axis */
            transform: translateY(100px);
            /* change the position in x axis */
            transform: translate(200px, 200px);
            transform: scaleX(1.5);
            /* transform: translate(200px, 200px) scaleY(2); */
            /* rotate x axis and y axis */
            /* transform: rotate(25deg, 25deg); */
            /* rotateX(), rotateY(), rotateZ(), rotate(X, Y, Z) */
            /* transform: rotate(25deg, 35deg, 60deg); */
            /* transform: rotate3d(1, 1, 1, 30deg); */
            /* skew streching in diagonal way */
            /* transform: skew(80deg, 50deg); */
            /* transform: perspective(200px); */
            transform: translate(400px, 400px) scale(1.2) rotate(30deg, 30deg);

        }
    </style>
</head>
<body>
    <div class="box"></div>
</body>
</html>
