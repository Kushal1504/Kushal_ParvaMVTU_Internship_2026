<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            width: 200px;
            height: 200px;
            margin: 50px;
        }
        .box1{
            background-color: brown;
            border-width: 20px;
            border-style: solid;
            border-color: black;
            /* shorthand property */
            /* width style color */
            border: 10px solid black;
            /* Curve */
            border-radius: 50px; 
            border-top-right-radius: 20px;
            border-top-left-radius: 30px;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 50px;
            /* tr tl br bl */
            border-radius: 150px 60px 170px 80px;
            padding: 100px;
        }
        .box2{
            background-color: navy;
            border-width: 10px;
            border-style: dotted;
            border-color: yellow;
            border: 10px groove red;
        }
    </style>
</head>
<body>
    <!-- 2 classes in single -->
    <div class="box box1"></div>
    <div class="box box2"></div>
</body>
</html>
