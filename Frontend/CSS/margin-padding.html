<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    
        h1{
            color: red;
            background-color: lightcyan;
            padding: 30px;
            padding-top: 40px;
            padding-right: 50px;
            padding-bottom: 60px;
            padding-left: 70px;

            /* Shorthand property */
            /* padding - top right bottom left - Clockwise Dirn */
            padding: 50px 60px 70px 80px;
            /* padding for anticlockwise dirn - top-bottom left-right */
            padding: 50px 100px;
            /* only takes latest value (top down apporach) */
            padding: 50px 100px 150px;
            }

        h3{
            color: brown;
            background-color: burlywood;
            padding: 30px;

            margin: 50px;

            margin-top: 50px;
            margin-bottom: 30px;
            margin-left: 40px;
            margin-right: 50px;

            margin: 50px 40px 30px 20px;

            margin: 40px 80px;

            /* top left-right bottom */
            margin: 20px 40px 50px;

        }

    </style>
</head>
<body>
    <h1>Main Heading</h1>
    <h3>Sub Heading</h3>
</body>
</html>
