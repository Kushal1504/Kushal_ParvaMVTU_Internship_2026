<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Conditional Statements in JavaScript</h1>
    <p>1. if statement</p>
    <p>2. if-else statement</p>
    <p>3. else-if ladder</p>
    <p>4. switch statement</p>


    <script>
        let age = 23;
        
        // if(condition) {
        //     code
        // }

        if (age >= 18) {
            console.log("You are eligible to vote.");
        }


        if (age >= 18) {
            console.log("You are eligible to vote.");
        } else {
            console.log("You are not eligible to vote.");
        }

        let marks = 85;

        if (marks >= 90) {
            console.log("A");
        } else if (marks >= 80) {
            console.log("B");
        } else if (marks >= 70) {
            console.log("C");
        } else {
            console.log("D");
        }

        /*
        switch(expression) {
            case value1: {
                  code
                break;
                }
            case value2: {
                  code
                break;
            .
            .
            .
            default:{
                  code
        }
        }
        */

        let day = 3;
        switch(day) {
            case 1: {
                console.log("Monday");
                break;
            }
            case 2: {
                console.log("Tuesday");
                break;
            }
            case 3: {
                console.log("Wednesday");
                break;
            }
            case 4: {
                console.log("Thursday");
                break;
            }
            case 5: {
                console.log("Friday");
                break;
            }
            case 6: {
                console.log("Saturday");
                break;
            }
            case 7: {
                console.log("Sunday");
                break;
            }
            default: {
                console.log("unknown day");
            }
        }



    </script>
</body>
</html>
